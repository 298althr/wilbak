<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Insights | Wilbak Engineering</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">

    <style>
        :root { --neon-blue: #0076FF; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #0F172A; }
        .mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .industrial-grid { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 40px 40px; }
        .btn-premium { display: inline-block; padding: 0.75rem 2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.25em; font-size: 10px; border-radius: 0.125rem; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        
        #page-loader { position: fixed; inset: 0; background: #0A0C10; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #page-loader.fade-out { opacity: 0; pointer-events: none; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid rgba(0, 118, 255, 0.1); border-top: 3px solid #0076FF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body x-data="intelApp">

    <div id="page-loader">
        <div class="loader-spin mb-4"></div>
        <div class="mono text-[10px] text-blue-500 uppercase tracking-[0.4em] animate-pulse">Initializing Protocol...</div>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-10 py-6 bg-white border-b border-slate-200 sticky top-0 z-50">
        <a href="/"><img src="/logo.png" alt="WILBAK" class="h-8 md:h-10"></a>
        <div class="hidden md:flex items-center space-x-10 font-bold text-xs uppercase tracking-[0.2em]">
            <a href="/" class="text-slate-500 hover:text-blue-600 transition">Home</a>
            <a href="/projects/" class="text-slate-500 hover:text-blue-600 transition">Projects</a>
            <a href="/about/" class="text-slate-500 hover:text-blue-600 transition">About</a>
            <a href="/Orthom8pro/" class="text-slate-500 hover:text-blue-600 transition">OrthoMate™</a>
            <a href="/contact/" class="text-slate-500 hover:text-blue-600 transition">Contact</a>
            <a href="/insight/" class="text-blue-600 transition">News & Insights</a>
            <a href="/audit/" class="btn-premium bg-slate-900 text-white">Business Audit</a>
        </div>
        <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-slate-900">☰</button>
    </nav>

    <main class="min-h-screen pt-32 pb-40 px-6 max-w-7xl mx-auto">
        <header class="mb-24 text-center">
            <h2 class="text-6xl md:text-9xl font-black italic uppercase tracking-tighter leading-none mb-8">BUSINESS INSIGHTS</h2>
            <div class="h-1 w-24 bg-blue-600 mx-auto mb-10"></div>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto font-bold tracking-tight">Transforming global markets into precise operational protocols.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="node in intelNodes" :key="node.id">
                <div class="group relative bg-white border border-slate-200 p-8 hover:border-blue-600 transition rounded-sm shadow-sm hover:shadow-2xl">
                    <div class="flex justify-between items-center mb-6 text-[9px] mono text-slate-400 font-black">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded-full font-black italic uppercase" x-text="node.sector"></span>
                        <span x-text="new Date(node.createdAt).toLocaleDateString()"></span>
                    </div>
                    <h3 class="text-xl md:text-2xl font-black uppercase italic tracking-tighter leading-tight mb-4" x-text="node.title"></h3>
                    <p class="text-xs text-slate-500 font-bold leading-relaxed line-clamp-4 mb-8" x-text="node.insight"></p>
                    <a :href="`/insight/${node.id}`" class="block w-full py-4 border-2 border-slate-900 text-slate-900 font-black uppercase italic text-xs text-center hover:bg-slate-900 hover:text-white transition">READ FULL ARTICLE</a>
                </div>
            </template>
        </div>

        <div x-show="loadingIntel" class="py-40 text-center">
            <div class="loader-spin mx-auto mb-10"></div>
            <p class="mono text-slate-400 text-[10px] uppercase tracking-[0.4em]">SYNCING INTELLIGENCE LEDGER...</p>
        </div>
    </main>

    <footer class="bg-slate-950 text-white pt-20 pb-10 px-10 text-center text-[9px] font-bold text-slate-600 uppercase tracking-[0.4em]">
        © 2026 Wilbak Engineering Group // Built for Unbreakable Performance
    </footer>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('intelApp', () => ({
                intelNodes: [],
                loadingIntel: false,
                mobileMenu: false,
                async init() {
                    this.loadingIntel = true;
                    try {
                        const response = await fetch('/api/intelligence');
                        this.intelNodes = await response.json();
                    } catch (e) {
                        console.error('Fetch failed');
                    } finally {
                        this.loadingIntel = false;
                    }
                }
            }));
        });

        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('page-loader').classList.add('fade-out'); }, 500);
        });
        document.querySelectorAll('a').forEach(link => {
            if (link.hostname === window.location.hostname && !link.hash) {
                link.addEventListener('click', () => {
                    const loader = document.getElementById('page-loader');
                    loader.style.display = 'flex'; loader.classList.remove('fade-out');
                });
            }
        });
    </script>
</body>
</html>
