<!--
  ═══════════════════════════════════════════════════════════════════════════
   ORTHOM8pro  ·  Page Template  ·  page-template.html
  ═══════════════════════════════════════════════════════════════════════════

  HOW TO USE THIS TEMPLATE
  ─────────────────────────────────────────────────────────────────────────
  1. Duplicate this file into the relevant folder  (e.g. about/about.html)
  2. Update <title>, <meta name="description">, and <meta property="og:…">
  3. Set window.O8.activeNav to the key matching your page's nav link
     (see available keys in the nav below — the data-nav attribute)
  4. Replace the <!-- PAGE CONTENT --> region with your sections
  5. Keep the <head> font link and both CSS links intact
  6. Keep the footer and both <script> tags at the bottom intact
  7. Adjust relative paths to assets (../assets/ vs ./assets/) per depth

  FOLDER STRUCTURE ASSUMPTION
  ─────────────────────────────────────────────────────────────────────────
  /                          Root
  ├── index.html             Home (depth 0  → paths: ./assets/…)
  ├── assets/
  │   ├── css/
  │   │   └── o8-system.css
  │   └── js/
  │       └── o8-page.js
  ├── the-engine/
  │   └── engine_nodes.html  (depth 1 → paths: ../assets/…)
  ├── performance/
  │   └── index.html
  ├── testimony/
  │   └── master-matrix.html
  ├── risktable/
  │   └── investor-risk-matrix.html
  ├── submit-asset/
  │   └── submit-asset.html
  └── about/
      └── about.html

  NAMING CONVENTION
  ─────────────────────────────────────────────────────────────────────────
  CSS classes:
    o8-*         → design system components (defined in o8-system.css)
    reveal       → scroll-triggered animation target (handled by o8-page.js)
    reveal-left  → slides in from left on scroll
    reveal-right → slides in from right on scroll
    reveal-fade  → fades in only, no translate

  JS functions (all global, defined in o8-page.js):
    o8OpenModal(id)            → opens modal with that DOM id
    o8CloseModal(id, event)    → closes modal; pass event for backdrop
    o8ToggleAccordion(el)      → toggle accordion row open/closed
    o8SwitchTab(tabsId, idx)   → switch tabs/panels pair
    o8PipelineClick(el)        → click a pipeline node manually

  ═══════════════════════════════════════════════════════════════════════════
-->

  <!-- ── PATTERN A: Page Hero ────────────────────── -->

      <!-- Your section content here -->

  <!-- ── PATTERN E: Stats Strip ───────────────── -->
  <!--
    Add data-count, data-prefix, data-suffix to drive the counter animation.
    Numbers animate in when the strip enters the viewport.
    Use exactly 5 cells (the grid is repeat(5,1fr)).
    For fewer stats: remove cells and adjust grid-template-columns inline.
  -->
  <div class="o8-stats-strip">
    <div class="container">
      <div class="o8-stats-inner">

  <!-- ── PATTERN H: Proof / Testimonial Grid ───── -->

    Three columns by default.
    Add class o8-proof-card--dark to any card for the inverted dark treatment.

  <!-- ── PATTERN I: Accordion ─────────────────── -->
  <!--
    Works on both dark and light backgrounds.
    For dark surface (inside .o8-section--dark): use as shown.
    For light surface: add class o8-accordion-row--light to each row.

    onclick="o8ToggleAccordion(this)" is the only JS needed.
  -->
  <section class="o8-section o8-section--dark" id="accordion-section">
    <div class="container">
      <div class="o8-section-header reveal">
        <span class="o8-section-num">06 — Detail</span>
        <h2 class="type-section-head" style="color: var(--color-white);">
          Expandable <em>detail rows.</em>
        </h2>
      </div>

      <!-- Accordion container — add border-top once, not on each row -->
      <div style="border-top: 1px solid rgba(255,255,255,0.06);">

        <div class="o8-accordion-row" onclick="o8ToggleAccordion(this)">
          <div class="o8-accordion-head">
            <span class="o8-acc-id">01</span>
            <span class="o8-badge o8-badge--data">Data</span>
            <span class="o8-acc-name">Row Title — Node or Feature Name</span>
            <span class="o8-acc-meta">120ms</span>
            <!-- Importance dots: 10 dots total, filled = gold -->
            <div class="o8-importance-dots" style="width: 80px; flex-shrink: 0;">
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
              <div class="o8-importance-dot o8-importance-dot--filled"></div>
            </div>
            <svg class="o8-acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="o8-accordion-body">
            <!-- Main logic paragraph -->
            <p style="font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.8; font-weight: 300; max-width: 720px;">
              Main logic description. As long as needed. This is the full
              technical explanation of what this row/node/feature does.
            </p>

            <!-- Three-column detail grid -->
            <div class="o8-accordion-body-grid">

              <div class="o8-acc-block">
                <div class="o8-acc-block-label">Outputs</div>
                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
                  <span class="o8-chip o8-chip--dark">output_field</span>
                  <span class="o8-chip o8-chip--dark">another_field</span>
                </div>
              </div>

              <div class="o8-acc-block">
                <div class="o8-acc-block-label">Providers</div>
                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
                  <span class="o8-chip o8-chip--dark">Scraper API</span>
                  <span class="o8-chip o8-chip--dark">Yahoo Finance</span>
                </div>
              </div>

              <div class="o8-acc-block">
                <div class="o8-acc-block-label">Failure Mode</div>
                <div class="o8-acc-block-text">
                  Describe what happens if this node fails and how the
                  system degrades gracefully.
                </div>
              </div>

            </div>

            <!-- Gold insight callout -->
            <div class="o8-insight-callout">
              Key insight or notable fact about this row — written in
              italics in a gold-bordered callout.
            </div>
          </div>
        </div>

        <!-- Repeat .o8-accordion-row blocks as needed -->

      </div>
    </div>
  </section>


  <!-- ── PATTERN J: Tabs ───────────────────────── -->
  <!--
    Tab ids: the wrapper id is used by o8SwitchTab.
    onclick="o8SwitchTab('myTabs', 0)"  — always pass the wrapper id + index.
    Panels wrapper id must be the tabs id + "Panels" (e.g. "myTabsPanels").
  -->
  <section class="o8-section">
    <div class="container">
      <div class="o8-section-header reveal">
        <span class="o8-section-num">07 — Comparison</span>
        <h2 class="type-section-head">Tabbed <em>content.</em></h2>
      </div>

      <!-- Tab headers -->
      <div class="o8-tabs" id="myTabs">
        <div class="o8-tab active" onclick="o8SwitchTab('myTabs', 0)">Tab One</div>
        <div class="o8-tab"        onclick="o8SwitchTab('myTabs', 1)">Tab Two</div>
        <div class="o8-tab"        onclick="o8SwitchTab('myTabs', 2)">Tab Three</div>
      </div>

      <!-- Tab panels — id must be tabsId + "Panels" -->
      <div id="myTabsPanels" style="padding-top: 48px;">

        <div class="o8-tab-panel active">
          <!-- Tab 1 content — any layout works here -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;">
            <div>
              <h3 class="type-display-sm" style="margin-bottom: 16px;">Tab One Heading</h3>
              <p class="type-body">Description for tab one content.</p>
              <!-- Metric cards 2×2 -->
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px;">
