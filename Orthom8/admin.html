<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ortho'M8 Command Center</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #060c1c; color: #dde4ff; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #1A56FF; }
    .status-pill { display: inline-block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; font-family: 'IBM Plex Mono', monospace; }
    .s-NEW       { background: rgba(26,86,255,0.15); color: #4d7dff; border: 1px solid rgba(26,86,255,0.3); }
    .s-CONTACTED { background: rgba(212,172,58,0.15); color: #D4AC3A; border: 1px solid rgba(212,172,58,0.3); }
    .s-QUALIFIED { background: rgba(39,201,63,0.15); color: #27C93F; border: 1px solid rgba(39,201,63,0.3); }
    .s-ARCHIVED  { background: rgba(100,100,120,0.15); color: #7a8aaa; border: 1px solid rgba(100,100,120,0.3); }
    .card { background: #0d1526; border: 1px solid #1a2840; border-radius: 3px; }
    .tab { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #1A56FF; border-bottom-color: #1A56FF; }
    .tab:not(.active) { color: #4a5a7a; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Auth gate -->
  <div id="auth-gate" class="fixed inset-0 bg-[#060c1c] flex items-center justify-center z-50 text-center p-8">
    <div>
      <div class="w-12 h-12 border-2 border-[#1A56FF] border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
      <p class="mono text-[10px] text-[#1A56FF] tracking-[3px] uppercase">Authenticating</p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden p-4 pb-20">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 pt-2">
      <div>
        <p class="mono text-[9px] text-[#1A56FF] tracking-[3px] uppercase mb-1">Ortho'M8</p>
        <h1 class="text-lg font-bold text-[#dde4ff]">Command Center</h1>
      </div>
      <div id="live-dot" class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-[#27C93F] animate-pulse inline-block"></span>
        <span class="mono text-[9px] text-[#27C93F] tracking-widest uppercase">LIVE</span>
      </div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-3 gap-3 mb-6" id="stats-row">
      <div class="card p-3 text-center">
        <div class="mono text-xl font-bold text-[#dde4ff]" id="stat-total">—</div>
        <div class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mt-1">Total</div>
      </div>
      <div class="card p-3 text-center">
        <div class="mono text-xl font-bold text-[#D4AC3A]" id="stat-new">—</div>
        <div class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mt-1">New</div>
      </div>
      <div class="card p-3 text-center">
        <div class="mono text-xl font-bold text-[#27C93F]" id="stat-qualified">—</div>
        <div class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mt-1">Qualified</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-[#1a2840] mb-4">
      <button class="tab active" onclick="switchTab('leads')">Leads</button>
      <button class="tab" onclick="switchTab('campaign')">Campaign</button>
    </div>

    <!-- Leads tab -->
    <div id="tab-leads">
      <!-- Filter row -->
      <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <button onclick="setFilter('ALL')"      class="filter-btn active-filter mono text-[8px] tracking-widest uppercase px-3 py-1.5 border border-[#1a2840] rounded-sm whitespace-nowrap">All</button>
        <button onclick="setFilter('NEW')"      class="filter-btn mono text-[8px] tracking-widest uppercase px-3 py-1.5 border border-[#1a2840] rounded-sm whitespace-nowrap text-[#4d7dff]">New</button>
        <button onclick="setFilter('CONTACTED')"class="filter-btn mono text-[8px] tracking-widest uppercase px-3 py-1.5 border border-[#1a2840] rounded-sm whitespace-nowrap text-[#D4AC3A]">Contacted</button>
        <button onclick="setFilter('QUALIFIED')"class="filter-btn mono text-[8px] tracking-widest uppercase px-3 py-1.5 border border-[#1a2840] rounded-sm whitespace-nowrap text-[#27C93F]">Qualified</button>
        <button onclick="setFilter('ARCHIVED')" class="filter-btn mono text-[8px] tracking-widest uppercase px-3 py-1.5 border border-[#1a2840] rounded-sm whitespace-nowrap text-[#4a5a7a]">Archived</button>
      </div>

      <div id="leads-list" class="space-y-3"></div>
      <div id="leads-empty" class="hidden text-center py-12">
        <p class="mono text-[10px] text-[#4a5a7a] tracking-widest uppercase">No leads found</p>
      </div>
    </div>

    <!-- Campaign tab -->
    <div id="tab-campaign" class="hidden">
      <div id="campaign-stats" class="space-y-3 mb-6"></div>

      <div class="card p-4">
        <p class="mono text-[9px] text-[#1A56FF] tracking-[3px] uppercase mb-4">Send Campaign Batch</p>
        <div class="space-y-3">
          <div>
            <label class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase block mb-1">Template</label>
            <select id="send-template" class="w-full bg-[#060c1c] border border-[#1a2840] p-2.5 text-[#dde4ff] mono text-xs rounded-sm outline-none focus:border-[#1A56FF]">
              <option value="cold-outreach">cold-outreach</option>
              <option value="follow-up-1">follow-up-1</option>
              <option value="follow-up-2">follow-up-2</option>
              <option value="follow-up-3">follow-up-3</option>
            </select>
          </div>
          <div>
            <label class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase block mb-1">Campaign ID</label>
            <input id="send-campaign-id" type="text" placeholder="e.g. apr-2026-us"
              class="w-full bg-[#060c1c] border border-[#1a2840] p-2.5 text-[#dde4ff] mono text-xs rounded-sm outline-none focus:border-[#1A56FF]">
          </div>
          <div>
            <label class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase block mb-1">Test Email (optional — leave blank to send live)</label>
            <input id="send-test-email" type="email" placeholder="preview@example.com"
              class="w-full bg-[#060c1c] border border-[#1a2840] p-2.5 text-[#dde4ff] mono text-xs rounded-sm outline-none focus:border-[#1A56FF]">
          </div>
          <button onclick="sendCampaign()" id="send-btn"
            class="w-full py-3 bg-[#1A56FF] text-white mono text-[10px] tracking-widest uppercase font-bold rounded-sm">
            Send
          </button>
          <div id="send-result" class="hidden"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Lead detail modal -->
  <div id="lead-modal" class="hidden fixed inset-0 z-40 bg-black/70 flex items-end">
    <div class="card w-full rounded-t-lg max-h-[80vh] overflow-y-auto" style="border-bottom:none;">
      <div class="flex items-center justify-between p-4 border-b border-[#1a2840] sticky top-0 bg-[#0d1526]">
        <div>
          <p id="modal-name" class="font-bold text-[#dde4ff]">Name</p>
          <p id="modal-company" class="mono text-[9px] text-[#4a5a7a] tracking-widest uppercase mt-0.5">Company</p>
        </div>
        <button onclick="closeModal()" class="text-[#4a5a7a] p-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="modal-body" class="p-4 space-y-4"></div>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const API = window.location.origin;
  let allLeads = [];
  let currentFilter = 'ALL';
  let currentTab = 'leads';

  // ── Auth ──────────────────────────────────────────────────────────────────
  function getInitData() {
    return tg?.initData || '';
  }

  async function apiRequest(method, endpoint, body) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'x-telegram-init-data': getInitData()
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, opts);
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return res.json();
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    try {
      await loadLeads();
      await loadCampaignStats();
      document.getElementById('auth-gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    } catch (e) {
      document.getElementById('auth-gate').innerHTML = `
        <div class="text-center p-8">
          <p class="mono text-[10px] text-red-400 tracking-widest uppercase mb-2">Auth Failed</p>
          <p class="text-xs text-[#4a5a7a]">${e.message}</p>
          <p class="mono text-[8px] text-[#2a3a5a] mt-4 tracking-widest">Open via your Telegram bot to authenticate</p>
        </div>`;
    }
  }

  // ── Leads ─────────────────────────────────────────────────────────────────
  async function loadLeads() {
    allLeads = await apiRequest('GET', '/api/admin/leads');
    updateStats();
    renderLeads();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent     = allLeads.length;
    document.getElementById('stat-new').textContent       = allLeads.filter(l => l.status === 'NEW').length;
    document.getElementById('stat-qualified').textContent = allLeads.filter(l => l.status === 'QUALIFIED').length;
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter', 'border-[#1A56FF]', 'text-white'));
    document.querySelectorAll('.filter-btn').forEach(b => { if (b.textContent.trim().toUpperCase() === f || (f === 'ALL' && b.textContent.trim() === 'All')) { b.classList.add('active-filter', 'border-[#1A56FF]', 'text-white'); } });
    renderLeads();
  }

  function renderLeads() {
    const filtered = currentFilter === 'ALL' ? allLeads : allLeads.filter(l => l.status === currentFilter);
    const list = document.getElementById('leads-list');
    const empty = document.getElementById('leads-empty');

    if (!filtered.length) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = filtered.map(l => `
      <div class="card p-4 cursor-pointer active:opacity-70 transition" onclick="openLead('${l.id}')">
        <div class="flex items-start justify-between mb-2">
          <div>
            <p class="font-semibold text-[#dde4ff] text-sm">${esc(l.name)}</p>
            <p class="mono text-[9px] text-[#4a5a7a] tracking-widest mt-0.5">${esc(l.company || l.email)}</p>
          </div>
          <span class="status-pill s-${l.status}">${l.status}</span>
        </div>
        <div class="flex items-center justify-between mt-3">
          <span class="mono text-[8px] text-[#4a5a7a]">${esc(l.capitalRange || '—')}</span>
          <span class="mono text-[8px] text-[#2a3a5a]">${new Date(l.createdAt).toLocaleDateString()}</span>
        </div>
        ${l.emailLogs?.length ? `<div class="mt-2"><span class="mono text-[8px] text-[#1A56FF]">${l.emailLogs.length} email${l.emailLogs.length > 1 ? 's' : ''} sent</span></div>` : ''}
      </div>
    `).join('');
  }

  function openLead(id) {
    const l = allLeads.find(x => x.id === id);
    if (!l) return;

    document.getElementById('modal-name').textContent    = l.name;
    document.getElementById('modal-company').textContent = l.company || l.email;

    const statusOptions = ['NEW','CONTACTED','QUALIFIED','ARCHIVED'].map(s =>
      `<option value="${s}" ${s === l.status ? 'selected' : ''}>${s}</option>`
    ).join('');

    document.getElementById('modal-body').innerHTML = `
      <div class="grid grid-cols-2 gap-3">
        ${row('Email', l.email)}
        ${row('Phone', l.phone || '—')}
        ${row('Sector', l.sector || '—')}
        ${row('Capital', l.capitalRange || '—')}
        ${row('Call Time', l.callTime || 'Flexible')}
        ${row('Source', l.source || '—')}
        ${l.utmCampaign ? row('UTM Campaign', l.utmCampaign) : ''}
        ${row('Submitted', new Date(l.createdAt).toLocaleString())}
      </div>
      ${l.message ? `<div class="card p-3"><p class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mb-1">Message</p><p class="text-sm text-[#8a9bc0]">${esc(l.message)}</p></div>` : ''}
      ${l.emailLogs?.length ? `
        <div>
          <p class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mb-2">Email History</p>
          <div class="space-y-1.5">
            ${l.emailLogs.map(e => `<div class="flex justify-between items-center"><span class="mono text-[9px] text-[#1A56FF]">${esc(e.template)}</span><span class="mono text-[8px] text-[#2a3a5a]">${new Date(e.sentAt).toLocaleDateString()}</span></div>`).join('')}
          </div>
        </div>` : ''}
      <div>
        <p class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mb-2">Update Status</p>
        <div class="flex gap-2">
          <select id="status-select-${l.id}" class="flex-1 bg-[#060c1c] border border-[#1a2840] p-2 text-[#dde4ff] mono text-xs rounded-sm outline-none focus:border-[#1A56FF]">
            ${statusOptions}
          </select>
          <button onclick="updateStatus('${l.id}')"
            class="px-4 py-2 bg-[#1A56FF] text-white mono text-[9px] tracking-widest uppercase rounded-sm">
            Save
          </button>
        </div>
      </div>
    `;
    document.getElementById('lead-modal').classList.remove('hidden');
  }

  function row(label, value) {
    return `<div class="card p-2.5"><p class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mb-1">${label}</p><p class="text-sm text-[#dde4ff]">${esc(String(value))}</p></div>`;
  }

  async function updateStatus(id) {
    const sel = document.getElementById(`status-select-${id}`);
    try {
      await apiRequest('PATCH', `/api/admin/leads/${id}/status`, { status: sel.value });
      const lead = allLeads.find(l => l.id === id);
      if (lead) lead.status = sel.value;
      updateStats();
      renderLeads();
      closeModal();
      tg?.showAlert?.('Status updated.');
    } catch (e) {
      tg?.showAlert?.(`Failed: ${e.message}`);
    }
  }

  function closeModal() {
    document.getElementById('lead-modal').classList.add('hidden');
  }

  // ── Campaign ──────────────────────────────────────────────────────────────
  async function loadCampaignStats() {
    try {
      const data = await apiRequest('GET', '/api/admin/campaign/status');
      const container = document.getElementById('campaign-stats');
      container.innerHTML = `
        <div class="grid grid-cols-2 gap-3">
          <div class="card p-3 text-center">
            <div class="mono text-xl font-bold text-[#dde4ff]">${data.totalLeads}</div>
            <div class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mt-1">Total Leads</div>
          </div>
          <div class="card p-3 text-center">
            <div class="mono text-xl font-bold text-[#1A56FF]">${data.activeLeads}</div>
            <div class="mono text-[8px] text-[#4a5a7a] tracking-widest uppercase mt-1">Active</div>
          </div>
        </div>
        <div class="card p-4">
          <p class="mono text-[9px] text-[#1A56FF] tracking-[3px] uppercase mb-3">Emails Sent</p>
          <div class="space-y-2">
            ${data.counts.map(c => `
              <div class="flex justify-between items-center">
                <span class="mono text-[9px] text-[#8a9bc0]">${c.template}</span>
                <span class="mono text-[11px] font-bold ${c.sent > 0 ? 'text-[#D4AC3A]' : 'text-[#2a3a5a]'}">${c.sent}</span>
              </div>`).join('')}
          </div>
        </div>
        <div class="card p-4">
          <p class="mono text-[9px] text-[#27C93F] tracking-[3px] uppercase mb-3">Eligible to Send</p>
          <div class="space-y-2">
            ${data.eligibility.map(e => `
              <div class="flex justify-between items-center">
                <span class="mono text-[9px] text-[#8a9bc0]">${e.template}</span>
                <span class="mono text-[11px] font-bold ${e.eligible > 0 ? 'text-[#27C93F]' : 'text-[#2a3a5a]'}">${e.eligible}</span>
              </div>`).join('')}
          </div>
        </div>
      `;
    } catch (e) {
      document.getElementById('campaign-stats').innerHTML = `<p class="mono text-[10px] text-red-400">${e.message}</p>`;
    }
  }

  async function sendCampaign() {
    const template   = document.getElementById('send-template').value;
    const campaignId = document.getElementById('send-campaign-id').value.trim();
    const testEmail  = document.getElementById('send-test-email').value.trim();
    if (!campaignId) { tg?.showAlert?.('Campaign ID is required.'); return; }

    const btn = document.getElementById('send-btn');
    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const result = await apiRequest('POST', '/api/admin/campaign/send', { template, campaignId, testEmail: testEmail || undefined });
      const box = document.getElementById('send-result');
      box.className = 'card p-3 mt-2';
      box.innerHTML = `
        <p class="mono text-[9px] text-[#27C93F] tracking-widest uppercase mb-1">${result.mode === 'test' ? 'Test sent' : 'Campaign sent'}</p>
        ${result.mode === 'test'
          ? `<p class="text-xs text-[#8a9bc0]">Preview sent to ${result.sentTo}</p>`
          : `<p class="text-xs text-[#8a9bc0]">Sent: ${result.sent?.length || 0} &nbsp; Failed: ${result.failed?.length || 0}</p>`
        }`;
      box.classList.remove('hidden');
      await loadCampaignStats();
    } catch (e) {
      tg?.showAlert?.(`Send failed: ${e.message}`);
    } finally {
      btn.textContent = 'Send';
      btn.disabled = false;
    }
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-leads').classList.toggle('hidden', tab !== 'leads');
    document.getElementById('tab-campaign').classList.toggle('hidden', tab !== 'campaign');
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.textContent.toLowerCase() === tab);
    });
    if (tab === 'campaign') loadCampaignStats();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  boot();
</script>
</body>
</html>
