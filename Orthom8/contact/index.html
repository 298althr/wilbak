<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Ortho'M8 — Let's Talk About Protecting Your Business</title>
  <meta name="description" content="Have questions about protecting your business capital? Our team is ready to walk you through everything — no jargon, no pressure.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System & Page Template -->
  <link rel="stylesheet" href="/Orthom8/shared-nav.css">
  <link rel="stylesheet" href="/Orthom8/page-template.css">
  <script src="/Orthom8/shared-nav.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n-loader.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    .contact-link {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--brand-cobalt);
      font-size: 1rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-link:hover { color: var(--brand-gold-light); text-decoration: underline; }
  </style>
</head>
<body>

<div id="app" x-data>
  <div id="site-nav-root"></div>

  <main>
    <section id="contact-split">
      <div class="contact-form-side">
        <div class="anim-slide-up">
          <span class="text-eyebrow" style="margin-bottom:1.5rem;"
                x-text="$store.i18n.t('content.hero.eyebrow')">Tactical Response Terminal</span>
          <h1 class="hero-heading" style="margin-bottom: clamp(1.5rem, 4vw, 2.5rem); font-size: clamp(2.5rem, 6vw, 4rem);">
            Let's protect your capital. <em>Together.</em>
          </h1>

          <div>
            <div class="contact-card anim-slide-up delay-1" style="padding: clamp(1.5rem, 4vw, 2.5rem);">
              <span class="mono" style="font-size: 9px; color: var(--tx-muted); text-transform: uppercase; letter-spacing: 3px;"
                    x-text="$store.i18n.t('content.cards.0.category')">Global Operations</span>
              <h3 class="serif text-xl md:text-2xl font-bold"
                  x-text="$store.i18n.t('content.cards.0.title')">Institutional Support</h3>
              <a class="contact-link" style="font-size: clamp(0.875rem, 2vw, 1rem);"
                 :href="'mailto:' + $store.i18n.t('content.cards.0.contact')"
                 x-text="$store.i18n.t('content.cards.0.contact')">support@orthom8.com</a>
            </div>

            <div class="contact-card anim-slide-up delay-2" style="padding: clamp(1.5rem, 4vw, 2.5rem);">
              <span class="mono" style="font-size: 9px; color: var(--tx-muted); text-transform: uppercase; letter-spacing: 3px;"
                    x-text="$store.i18n.t('content.cards.1.category')">Technical Board</span>
              <h3 class="serif text-xl md:text-2xl font-bold"
                  x-text="$store.i18n.t('content.cards.1.title')">Direct Line</h3>
              <a class="contact-link" style="font-size: clamp(0.875rem, 2vw, 1rem);"
                 :href="'tel:' + $store.i18n.t('content.cards.1.contact')"
                 x-text="$store.i18n.t('content.cards.1.contact')">+1 (704) 309-9436</a>
            </div>

            <div class="contact-card anim-slide-up delay-3" style="padding: clamp(1.5rem, 4vw, 2.5rem);">
              <span class="mono" style="font-size: 9px; color: var(--tx-muted); text-transform: uppercase; letter-spacing: 3px;"
                    x-text="$store.i18n.t('content.cards.2.category')">Global Liaison</span>
              <h3 class="serif text-xl md:text-2xl font-bold"
                  x-text="$store.i18n.t('content.cards.2.title')">Office Locations</h3>
              <p class="body-text" style="font-size: clamp(0.875rem, 2vw, 1rem);"
                 x-text="$store.i18n.t('content.cards.2.contact')">New York City — Johannesburg — London — Hong Kong</p>
            </div>
          </div>
        </div>
      </div>

      <div class="contact-visual-side anim-fade-in">
        <div class="img-overlay"></div>
        <video autoplay muted loop playsinline
               style="width:100%; height:100%; object-fit:cover; display:block;">
          <source src="https://res.cloudinary.com/dgz88jxiy/video/upload/v1774275213/original-4d4a8abe32825ea668de60148644bd05_vvj2xv.mp4" type="video/mp4">
        </video>
      </div>
    </section>
  </main>

  <div id="site-footer-root"></div>
</div>

</body>
</html>
