<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Wilbak Intelligence</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{URL}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{INSIGHT}}">
    <meta property="og:image" content="/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{URL}}">
    <meta property="twitter:title" content="{{TITLE}}">
    <meta property="twitter:description" content="{{INSIGHT}}">
    <meta property="twitter:image" content="/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .industrial-grid {
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body class="industrial-grid min-h-screen">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 py-6">
        <div class="max-w-4xl mx-auto px-6 flex justify-between items-center">
            <a href="/" class="text-2xl font-black uppercase italic tracking-tighter">WILBAK<span
                    class="text-blue-600">.</span></a>
            <a href="/#insights"
                class="text-xs mono font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition">←
                Back to Feed</a>
        </div>
    </nav>

    <main class="pt-32 pb-40 px-6">
        <div class="max-w-3xl mx-auto">
            <article class="bg-white border border-slate-200 rounded-xl shadow-2xl overflow-hidden">
                <!-- Post Header -->
                <div class="p-8 flex items-center justify-between border-b border-slate-50">
                    <div class="flex items-center space-x-4">
                        <div
                            class="w-14 h-14 bg-slate-900 rounded-full flex items-center justify-center text-white font-black italic text-2xl border-2 border-blue-600">
                            W
                        </div>
                        <div>
                            <div
                                class="text-xl font-black uppercase italic tracking-tighter text-slate-900 leading-none">
                                Wilhelm Rybak</div>
                            <div class="text-[10px] mono text-blue-600 uppercase tracking-widest mt-2">SECTOR:
                                {{SECTOR}}</div>
                        </div>
                    </div>
                    <div class="text-xs mono text-slate-400 uppercase tracking-widest">{{DATE}}</div>
                </div>

                <!-- Body -->
                <div class="p-10 md:p-14">
                    <h1
                        class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-8 leading-tight text-slate-900">
                        {{TITLE}}</h1>
                    <p
                        class="text-2xl md:text-3xl font-bold text-slate-500 italic mb-12 border-l-8 border-blue-50 pl-8 py-2">
                        {{INSIGHT}}</p>

                    <div class="prose prose-slate max-w-none mb-16 space-y-8 text-slate-700 text-lg leading-relaxed">
                        <div>
                            <h4
                                class="text-[10px] mono text-slate-400 uppercase tracking-widest mb-4 flex items-center">
                                <span class="w-2 h-2 bg-blue-500 mr-2"></span> THE SIGNAL
                            </h4>
                            <p>{{MARKET_EVENT}}</p>
                        </div>

                        <div class="bg-slate-900 p-10 rounded-sm text-white">
                            <h4
                                class="text-[10px] mono text-blue-400 uppercase tracking-widest mb-6 border-b border-slate-800 pb-2">
                                CRITICAL ANALYSIS</h4>
                            <p class="text-xl font-medium text-slate-200">{{LOGIC_ANALYSIS}}</p>
                        </div>
                    </div>

                    <!-- CTA -->
                    <div class="bg-blue-600 p-12 rounded-2xl text-white shadow-xl">
                        <div class="text-blue-200 text-[10px] mono uppercase tracking-widest mb-6">OPPORTUNITY PROTOCOL
                        </div>
                        <p class="text-3xl font-black uppercase italic tracking-tighter mb-12 leading-tight">
                            {{CONVERSION_STEP}}</p>
                        <a href="/#audit"
                            class="inline-block w-full text-center py-6 bg-white text-blue-600 font-black uppercase italic tracking-widest hover:bg-slate-900 hover:text-white transition-all duration-300 rounded-lg">
                            INITIALIZE AUDIT
                        </a>
                    </div>
                </div>
            </article>

            <footer class="mt-20 text-center">
                <p class="text-xs mono text-slate-400 uppercase tracking-widest">© 2026 Wilbak Engineering |
                    Intelligence Node {{ID}}</p>
            </footer>
        </div>
    </main>
</body>

</html>
