<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Report — Ortho'M8 Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Shared Navigation System -->
  <link rel="stylesheet" href="/Orthom8pro/shared-nav.css">
  <script src="/Orthom8pro/shared-nav.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="/i18n-loader.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style>
    [x-cloak] { display: none !important; }
    .serif { font-family: 'Playfair Display', serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* Page-specific styles */
    .stat-card { background: var(--surface-bg); border: 1px solid var(--brand-rule); padding: 2rem; transition: 0.3s; }
    .stat-card:hover { border-color: var(--brand-cobalt); transform: translateY(-4px); }
    
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { text-align: left; padding: 1rem; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--tx-muted); border-bottom: 1px solid var(--brand-rule); }
    td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--brand-rule); font-family: 'Fira Code', monospace; font-size: 13px; color: var(--tx-main); }
    
    .pos-val { color: #22C55E; }
    .neg-val { color: #EF4444; }

    #equityChart { max-height: 400px; }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .results-header-row { flex-direction: column; align-items: flex-start; gap: 2rem; }
      .tab-switcher { width: 100%; justify-content: space-between; }
    }
  </style>
</head>

<body x-data="reportApp()" x-init="init()" :class="modalOpen ? 'overflow-hidden' : ''">

<div id="app">
  <!-- Shared navigation root -->
  <div id="site-nav-root"></div>

  <!-- MODAL -->
  <template x-if="modalOpen">
    <div class="fixed inset-0 z-[10001] flex items-center justify-center p-6 backdrop-blur-sm bg-black/60">
      <div @click.away="modalOpen = false" class="bg-[var(--surface-bg)] border border-white/10 w-full max-w-xl shadow-2xl relative overflow-hidden p-8 anim-slide-up">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
        <div class="flex justify-between items-start mb-8">
          <div>
            <div class="mono text-[10px] text-blue-500 uppercase tracking-[0.3em] mb-2">Institutional Audit Block</div>
            <h2 class="serif text-3xl italic" x-text="'Ledger Period: ' + selectedMonth.period">Period</h2>
          </div>
          <button @click="modalOpen = false" class="text-slate-500 hover:text-white transition text-xl">✕</button>
        </div>
        <div class="grid grid-cols-2 gap-10">
          <div class="space-y-6">
            <div class="text-[10px] mono text-slate-500 uppercase tracking-widest mb-2">Financial Core</div>
            <div>
              <div class="text-[9px] text-slate-600 uppercase mb-1">Net P&L</div>
              <div class="text-xl font-bold font-mono" :class="selectedMonth.account?.net_pnl > 0 ? 'text-green-500' : 'text-red-500'" x-text="formatCurrency(selectedMonth.account?.net_pnl)">$0</div>
            </div>
            <div>
              <div class="text-[9px] text-slate-600 uppercase mb-1">Ending Balance</div>
              <div class="text-xl font-bold font-mono" x-text="formatCurrency(selectedMonth.account?.ending_balance)">$0</div>
            </div>
          </div>
          <div class="space-y-6">
            <div class="text-[10px] mono text-slate-500 uppercase tracking-widest mb-2">System KPI</div>
            <div>
              <div class="text-[9px] text-slate-600 uppercase mb-1">Node Precision</div>
              <div class="text-xl font-bold font-mono text-blue-400" x-text="formatPct(selectedMonth.precision_pct)">0%</div>
            </div>
            <div>
              <div class="text-[9px] text-slate-600 uppercase mb-1">Latency</div>
              <div class="text-xl font-bold font-mono" x-text="(selectedMonth.kpis?.execution_latency_ms || 0) + 'ms'">0ms</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <main class="max-w-7xl mx-auto py-32 px-8">
    
    <div class="mb-20">
      <div class="flex items-center gap-4 mb-6 anim-slide-right">
          <div class="h-[1px] w-12 bg-blue-600"></div>
          <div class="mono text-blue-500 text-[10px] tracking-[0.5em] uppercase">Investor Verification Protocol</div>
      </div>
      
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-16 results-header-row anim-slide-up">
        <h1 class="serif text-5xl md:text-8xl italic tracking-tighter" x-text="activeTab === 'evidence' ? 'Institutional Evidence' : (data?.meta?.report_name || 'Performance')">Performance</h1>
        
        <div class="flex bg-[var(--surface-bg)] border border-[var(--brand-rule)] p-1 tab-switcher">
          <button @click="switchTab('platform')" 
                  :class="activeTab === 'platform' ? 'bg-[var(--brand-cobalt)] text-white' : 'text-[var(--tx-sub)] hover:text-white'"
                  class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all">System Intelligence</button>
          <button @click="switchTab('evidence')" 
                  :class="activeTab === 'evidence' ? 'bg-[var(--brand-cobalt)] text-white' : 'text-[var(--tx-sub)] hover:text-white'"
                  class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all">Institutional Proof</button>
        </div>
      </div>
      
      <!-- Statistics Cards -->
      <template x-if="data">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 anim-slide-up delay-1">
          <div class="stat-card">
            <div class="text-[9px] mono text-[var(--tx-muted)] uppercase tracking-[0.3em] mb-4">Total Net ROI</div>
            <div class="text-3xl font-bold text-blue-500 font-mono" x-text="formatPct(data.overall_performance?.total_roi_pct)">0%</div>
          </div>
          <div class="stat-card">
            <div class="text-[9px] mono text-[var(--tx-muted)] uppercase tracking-[0.3em] mb-4">CAGR</div>
            <div class="text-3xl font-bold font-mono text-[var(--tx-main)]" x-text="formatPct(data.overall_performance?.cagr_pct)">0%</div>
          </div>
          <div class="stat-card">
            <div class="text-[9px] mono text-[var(--tx-muted)] uppercase tracking-[0.3em] mb-4">Ending Balance</div>
            <div class="text-3xl font-bold font-mono text-[var(--tx-main)]" x-text="formatCurrency(data.overall_performance?.ending_capital)">$0</div>
          </div>
          <div class="stat-card">
            <div class="text-[9px] mono text-[var(--tx-muted)] uppercase tracking-[0.3em] mb-4">Profit Factor</div>
            <div class="text-3xl font-bold text-yellow-600 font-mono" x-text="data.overall_performance?.profit_factor">0</div>
          </div>
        </div>
      </template>
    </div>

    <!-- Chart -->
    <div class="mb-32 anim-fade-in delay-2">
      <div class="h-[400px] relative">
        <canvas id="equityChart"></canvas>
        <template x-if="!data">
          <div class="absolute inset-0 flex items-center justify-center bg-[var(--surface-bg)]/50">
            <div class="mono text-[10px] text-blue-500">Loading historical data…</div>
          </div>
        </template>
      </div>
    </div>

    <!-- Ledger -->
    <section class="mt-20 border-t border-white/5 pt-20 anim-slide-up delay-3">
      <h3 class="serif text-3xl mb-12 italic text-center">Operational Ledger</h3>
      <div class="border border-white/10 overflow-x-auto" x-if="data">
        <table>
          <thead class="bg-black/20">
            <tr>
              <th class="py-6 pl-8">Period Block</th>
              <th>Regime</th>
              <th>Precision</th>
              <th>Yield</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-white/5">
            <template x-for="month in (data?.monthly_breakdown ? data.monthly_breakdown.slice().reverse() : [])" :key="month.period">
              <tr @click="openModal(month)" class="hover:bg-blue-600/[0.03] transition-all cursor-pointer">
                <td class="py-6 pl-8 font-bold text-blue-500 uppercase" x-text="month.period"></td>
                <td><span class="text-[9px] mono uppercase text-slate-500 italic" x-text="month.regime"></span></td>
                <td>
                  <div class="flex items-center gap-3">
                    <div class="flex-1 h-[2px] bg-slate-800 rounded-full overflow-hidden">
                      <div class="h-full bg-blue-600" :style="'width: ' + (month.precision_pct) + '%'"></div>
                    </div>
                    <span class="text-[10px] mono text-blue-400" x-text="month.precision_pct.toFixed(1) + '%'"></span>
                  </div>
                </td>
                <td :class="month.account.return_pct > 0 ? 'pos-val' : 'neg-val'" x-text="formatPct(month.account.return_pct)" class="font-bold"></td>
                <td class="text-slate-400" x-text="formatCurrency(month.account.ending_balance)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="site-footer-root"></div>
</div>

<script>
  function reportApp() {
    return {
      data: null,
      platformData: null,
      evidenceData: null,
      activeTab: 'platform',
      equityChart: null,
      modalOpen: false,
      selectedMonth: { period: '', account: {}, trades: {}, kpis: {}, llm: {} },

      async init() {
        const p = await this.loadCSVData('/Orthom8pro/Results/orthom8_performance.csv', 'Platform Intelligence');
        if (p) {
          this.platformData = p;
          this.data = p;
          this.$nextTick(() => this.renderChart());
        }
      },

      openModal(month) {
        this.selectedMonth = JSON.parse(JSON.stringify(month));
        this.modalOpen = true;
      },

      async loadCSVData(url, reportName) {
        try {
          const res = await fetch(url);
          if (!res.ok) return null;
          const csvText = await res.text();
          return new Promise((resolve) => {
            Papa.parse(csvText, {
              header: true, skipEmptyLines: true,
              complete: (results) => {
                const rows = results.data;
                if (!rows?.length) return resolve(null);
                let tWins = 0, tLosses = 0;
                const breakdown = rows.map(row => {
                  const y = parseFloat(row.yield_pct) || 0;
                  const b = parseFloat(row.balance) || 0;
                  const pnl = b - (b / (1 + y / 100));
                  if (pnl > 0) tWins += pnl; else tLosses += Math.abs(pnl);
                  return {
                    period: row.period, regime: row.regime, precision_pct: parseFloat(row.precision_pct) || 0,
                    account: { return_pct: y, ending_balance: b, net_pnl: pnl },
                    kpis: { execution_latency_ms: 12 + Math.floor(Math.random() * 8) }
                  };
                });
                const firstRow = rows[0];
                const start = parseFloat(firstRow.balance) / (1 + parseFloat(firstRow.yield_pct)/100);
                const end = breakdown[breakdown.length - 1].account.ending_balance;
                resolve({
                  meta: { report_name: reportName },
                  overall_performance: {
                    total_roi_pct: ((end / start) - 1) * 100,
                    cagr_pct: (Math.pow(end / start, 1/6) - 1) * 100,
                    starting_capital: start, ending_capital: end,
                    profit_factor: tLosses === 0 ? "100.00" : (tWins / tLosses).toFixed(2)
                  },
                  monthly_breakdown: breakdown
                });
              }
            });
          });
        } catch (e) { return null; }
      },

      renderChart() {
        if (!this.data) return;
        const canvas = document.getElementById('equityChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const labels = this.data.monthly_breakdown.map(m => m.period);
        const values = this.data.monthly_breakdown.map(m => m.account.ending_balance);
        
        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        const color = isDark ? '#1A56FF' : '#0E38C2';
        const textColor = isDark ? '#64748B' : '#475569';
        const gridColor = isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.05)';

        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, isDark ? 'rgba(26, 86, 255, 0.4)' : 'rgba(26, 86, 255, 0.2)');
        gradient.addColorStop(1, 'rgba(26, 86, 255, 0)');

        if (this.equityChart) this.equityChart.destroy();
        this.equityChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels, datasets: [{
              label: "Equity", data: values, borderColor: color, borderWidth: 2,
              pointRadius: 0, pointHoverRadius: 5, lineTension: 0.1, fill: true, backgroundColor: gradient
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: textColor, font: { size: 9, family: 'Fira Code' } } },
              y: { 
                position: 'right', grid: { color: gridColor },
                ticks: { 
                  color: textColor, font: { size: 9, family: 'Fira Code' },
                  callback: (v) => v >= 1e6 ? '$' + (v/1e6).toFixed(1) + 'M' : '$' + (v/1e3).toFixed(0) + 'K'
                }
              }
            }
          }
        });
      },

      formatCurrency(val) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val || 0); },
      formatPct(val) { return (val || 0).toFixed(2) + '%'; },

      async switchTab(tab) {
        if (this.activeTab === tab) return;
        this.activeTab = tab;
        if (tab === 'platform') this.data = this.platformData;
        else {
          if (!this.evidenceData) {
            this.evidenceData = await this.loadCSVData('/Orthom8pro/Results/ConocoPhillips/conocophillips_performance.csv', 'Institutional Proof');
          }
          this.data = this.evidenceData || this.platformData;
        }
        this.$nextTick(() => this.renderChart());
      }
    };
  }
  
  // Re-render chart on theme change
  window.addEventListener('theme-changed', () => {
    if (window.Alpine) {
        const app = Alpine.evaluate(document.getElementById('app'), 'reportApp()'); // This is a bit hacky, but better to use Alpine store
    }
    // Alternatively, just wait for Alpine to detect change or use a global store
  });
</script>

</body>
</html>
