<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Ortho'M8 Tactical Response</title>
  <meta name="description" content="Get in direct contact with the Ortho'M8 team for technical inquiries, operational support, and institutional consultation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Shared Navigation System -->
  <link rel="stylesheet" href="/Orthom8pro/shared-nav.css">
  <script src="/Orthom8pro/shared-nav.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n-loader.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    .serif { font-family: 'Playfair Display', serif; }
    
    /* Contact Split Layout */
    #contact-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      margin-top: 68px;
    }

    .contact-form-side {
      padding: clamp(3rem, 6vw, 6rem) clamp(1.5rem, 4vw, 4rem);
      border-right: 1px solid var(--brand-rule-strong);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--page-bg);
    }

    .contact-visual-side {
      position: sticky;
      top: 68px;
      height: calc(100vh - 68px);
      overflow: hidden;
      background: var(--surface-bg);
    }
    .contact-visual-side img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: saturate(0.8) contrast(1.1);
    }
    .img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(26,86,255,0.15), transparent);
      z-index: 2; pointer-events: none;
    }

    .contact-card {
      background: var(--surface-bg);
      border: 1px solid var(--brand-rule-strong);
      padding: 2.5rem;
      transition: all 0.3s ease;
      display: flex; flex-direction: column; gap: 1rem;
      margin-bottom: 2rem;
    }
    .contact-card:hover {
      border-color: var(--brand-cobalt);
      background: var(--surface-2);
      transform: translateX(5px);
    }

    @media (max-width: 1024px) {
      #contact-split { grid-template-columns: 1fr; }
      .contact-visual-side { display: none; }
      .contact-form-side { border-right: none; }
    }
  </style>
</head>
<body>

<div id="app">
  <div id="site-nav-root"></div>

  <main>
    <section id="contact-split">
      <div class="contact-form-side">
        <div class="anim-slide-up">
          <span class="text-eyebrow mb-6">Tactical Response Terminal</span>
          <h1 class="hero-heading mb-10">Direct <em>Technical</em> <br>Consultation.</h1>
          
          <div class="space-y-6">
            <div class="contact-card anim-slide-up delay-1">
              <span class="font-mono text-[9px] text-slate-500 uppercase tracking-widest">Global Operations</span>
              <h3 class="serif text-2xl font-bold">Institutional Support</h3>
              <a href="mailto:support@orthom8.com" class="font-mono text-blue-500 text-lg hover:underline transition">support@orthom8.com</a>
            </div>

            <div class="contact-card anim-slide-up delay-2">
              <span class="font-mono text-[9px] text-slate-500 uppercase tracking-widest">Technical Board</span>
              <h3 class="serif text-2xl font-bold">Direct Line</h3>
              <a href="tel:+1800687468" class="font-mono text-blue-500 text-lg hover:underline transition">+1 (800) O-R-T-H-O-M-8</a>
            </div>

            <div class="contact-card anim-slide-up delay-3">
              <span class="font-mono text-[9px] text-slate-500 uppercase tracking-widest">Global Liaison</span>
              <h3 class="serif text-2xl font-bold">Office Locations</h3>
              <p class="body-text">New York City — Johannesburg — London — Hong Kong</p>
            </div>
          </div>
        </div>
      </div>

      <div class="contact-visual-side anim-fade-in">
        <div class="img-overlay"></div>
        <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774330490/contact_visual.jpg" alt="Strategic Operations Centre">
      </div>
    </section>
  </main>

  <div id="site-footer-root"></div>
</div>

</body>
</html>
