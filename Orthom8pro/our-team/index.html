<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Team — Ortho'M8 AI Trading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style>
      [x-cloak] { display: none !important; }
      .serif { font-family: 'Playfair Display', serif; }
      .mono { font-family: 'IBM Plex Mono', monospace; }

      /* LOGO ADAPTIVE SWAP */
      .logo-dark-theme { display: block; }
      .logo-light-theme { display: none; }
      [data-theme="light"] .logo-dark-theme { display: none; }
      [data-theme="light"] .logo-light-theme { display: block; }
  </style>

  <style>
    /* DESIGN TOKENS */
    :root {
      --brand-cobalt:      #1A56FF;
      --brand-cobalt-dim:  #0E38C2;
      --brand-gold:        #B8972A;
      --brand-gold-light:  #D4AC3A;
      --brand-gold-pale:   rgba(184,151,42,0.12);
      --page-bg:           #060C18;
      --surface-bg:        #0B1325;
      --surface-2:         #0F1A30;
      --surface-glass:     rgba(11,19,37,0.8);
      --tx-main:           #E8EDF5;
      --tx-sub:            #6E7E9A;
      --tx-muted:          #3A4A62;
      --brand-rule:        rgba(255,255,255,0.06);
      --brand-rule-strong: rgba(255,255,255,0.12);
      --glow-cobalt:       rgba(26,86,255,0.15);
      --glow-gold:         rgba(184,151,42,0.12);
      --header-bg:         rgba(6,12,24,0.88);
      --scan-line:         rgba(26,86,255,0.04);
      --drawer-bg:         #080F20;
    }
    [data-theme="light"] {
      --page-bg:           #F7F8FC;
      --surface-bg:        #EDEEF5;
      --surface-2:         #E4E6F0;
      --surface-glass:     rgba(237,238,245,0.88);
      --tx-main:           #0A1020;
      --tx-sub:            #4A5568;
      --tx-muted:          #9AA5B8;
      --brand-rule:        rgba(0,0,0,0.07);
      --brand-rule-strong: rgba(0,0,0,0.14);
      --glow-cobalt:       rgba(26,86,255,0.08);
      --glow-gold:         rgba(184,151,42,0.08);
      --header-bg:         rgba(247,248,252,0.92);
      --scan-line:         rgba(26,86,255,0.02);
      --drawer-bg:         #F2F3FA;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--page-bg); color: var(--tx-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; line-height: 1.6;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan-line) 2px, var(--scan-line) 4px);
      opacity: 0.6;
    }
    body.drawer-open { overflow: hidden; }

    .hero-heading { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 6vw, 4.2rem); font-weight: 600; line-height: 1.08; letter-spacing: -0.02em; }
    .hero-heading em { font-style: italic; color: var(--brand-gold-light); }
    .section-heading { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 4vw, 3rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 0.7rem 1.5rem; background: var(--brand-cobalt); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; position: relative; overflow: hidden; }
    .btn-primary:hover { background: var(--brand-cobalt-dim); box-shadow: 0 0 24px rgba(26,86,255,0.4); transform: translateY(-1px); }
    .layout-container { max-width: 1380px; margin: 0 auto; padding: 0 clamp(1.25rem, 5vw, 4rem); }

    #site-header { position: fixed; top: 0; left: 0; right: 0; height: 68px; z-index: 200; background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--brand-rule-strong); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(1.25rem, 3vw, 2.5rem); }
    .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-name { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--tx-main); }
    .header-nav { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
    .header-nav a { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--tx-sub); text-decoration: none; }
    
    #mobile-drawer { position: fixed; top: 0; right: 0; width: 300px; height: 100vh; background: var(--drawer-bg); z-index: 300; transform: translateX(100%); transition: 0.4s; display: flex; flex-direction: column; border-left: 1px solid var(--brand-rule-strong); }
    #mobile-drawer.open { transform: translateX(0); }
    #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 290; opacity: 0; pointer-events: none; transition: 0.3s; }
    #drawer-overlay.visible { opacity: 1; pointer-events: all; }

    #welcome-gate { position: fixed; inset: 0; z-index: 9999; background: var(--page-bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; transition: opacity 0.5s; }
    .gate-logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; color: var(--tx-main); }
    .gate-bar-wrap { width: 200px; height: 1px; background: var(--brand-rule-strong); position: relative; overflow: hidden; }
    .gate-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--brand-cobalt); width: 100%; animation: gate-load 1.5s ease; }
    @keyframes gate-load { from { width: 0; } to { width: 100%; } }
    .gate-status { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--brand-cobalt); text-transform: uppercase; letter-spacing: 2px; }

    .director-card { display: flex; align-items: center; gap: 1.25rem; border-left: 1px solid var(--brand-rule-strong); padding: 1rem 1.25rem; }
    .director-portrait { width: 64px; height: 64px; border: 1px solid var(--brand-rule-strong); overflow: hidden; }
    .director-portrait img { width: 100%; height: 100%; object-fit: cover; }
    
    [x-cloak] { display: none !important; }

    @media (max-width: 1024px) { .header-nav, .header-controls { display: none; } .mobile-header-right { display: flex; } }
  </style>
</head>
<body x-data="teamApp">

<div id="welcome-gate" x-show="loading" x-transition:leave="transition ease-in duration-500">
  <!-- Literal Swap: Blue logo for Dark background per user request -->
  <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774323178/light-mode_xr11qj.svg" alt="Wilbak Logo" class="h-16 mb-6">
  <div class="gate-logo" style="letter-spacing: 12px;">OUR TEAM</div>
  <div class="gate-bar-wrap"><div class="gate-bar"></div></div>
  <div class="gate-status">INITIALIZING TEAM ACCESS…</div>
</div>

<div id="app" x-cloak x-show="!loading">
  <div id="drawer-overlay"></div>

  <div id="mobile-drawer">
    <div class="drawer-header">
      <a href="/Orthom8pro/" class="logo-wrap">
        <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774323178/light-mode_xr11qj.svg" alt="Wilbak Logo" class="h-8 logo-dark-theme">
        <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774323178/dark-mode_sqtgql.svg" alt="Wilbak Logo" class="h-8 logo-light-theme">
        <span class="logo-name">Ortho'M8</span>
      </a>
      <button id="drawer-close" style="color:var(--tx-sub); font-size:20px;">✕</button>
    </div>
    <nav class="drawer-nav">
      <a href="https://wilbakengineering.com">Home</a>
      <a href="/Orthom8pro/#performance">Performance</a>
      <a href="/Orthom8pro/#engine">How It Works</a>
      <a href="/Orthom8pro/our-team/" class="active">Our Team</a>
      <div class="p-6">
        <select class="lang-select w-full" @change="loadLang($event.target.value)">
          <option value="en">English (EN)</option>
          <option value="es">Español (ES)</option>
          <option value="de">Deutsch (DE)</option>
          <option value="fr">Français (FR)</option>
          <option value="zh">中文 (ZH)</option>
        </select>
      </div>
    </nav>
  </div>

  <header id="site-header">
    <a href="/Orthom8pro/" class="logo-wrap">
      <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774323178/light-mode_xr11qj.svg" alt="Wilbak Logo" class="h-8 logo-dark-theme">
      <img src="https://res.cloudinary.com/dgz88jxiy/image/upload/v1774323178/dark-mode_sqtgql.svg" alt="Wilbak Logo" class="h-8 logo-light-theme">
      <span class="logo-name">Ortho'M8</span>
    </a>
    <nav class="hidden lg:block">
      <ul class="header-nav">
        <li><a href="https://wilbakengineering.com">Home</a></li>
        <li><a href="/Orthom8pro/#performance">Performance</a></li>
        <li><a href="/Orthom8pro/#engine">How It Works</a></li>
        <li><a href="/Orthom8pro/our-team/">Our Team</a></li>
      </ul>
    </nav>
    <div class="flex items-center gap-4">
      <button class="bg-transparent border border-white/10 p-2 text-xs" id="theme-toggle">☀</button>
      <select class="bg-transparent border border-white/10 text-xs p-1" @change="loadLang($event.target.value)">
         <option value="en">EN</option>
         <option value="es">ES</option>
      </select>
      <button class="hamburger p-2 lg:hidden" id="hamburger-btn">☰</button>
    </div>
  </header>

  <main class="layout-container pt-32 pb-20">
    <section class="text-center mb-20" x-show="data">
      <h1 class="hero-heading mb-6" x-html="t('hero.heading')"></h1>
      <p class="max-w-2xl mx-auto text-slate-400" x-text="t('hero.description')"></p>
    </section>

    <div class="grid md:grid-cols-2 gap-12" x-show="data">
       <div class="border border-white/5 p-8 bg-white/3">
          <h2 class="section-heading mb-6" x-text="t('board_of_directors.heading')"></h2>
          <p class="text-slate-400 mb-6" x-text="t('board_of_directors.description')"></p>
          <img :src="t('board_of_directors.image_url')" class="w-full grayscale opacity-80">
       </div>
       <div class="space-y-6">
          <template x-for="member in t('team_members')">
            <div class="director-card bg-white/2">
               <div class="director-portrait"><img :src="member.image"></div>
               <div>
                  <div class="font-bold text-sm" x-text="member.name"></div>
                  <div class="text-[10px] text-amber-500 uppercase tracking-widest" x-text="member.title"></div>
               </div>
            </div>
          </template>
       </div>
    </div>
  </main>

  <footer class="border-t border-white/5 py-12 text-center bg-black/20" x-show="data">
     <div class="text-[10px] mono text-slate-600 uppercase tracking-[0.4em]" x-text="t('footer.copyright')"></div>
  </footer>
</div>

<script>
  /* ── Theme & Global Setup ─────────────────── */
  (function() {
    const html = document.documentElement;
    const theme = localStorage.getItem('o8_theme') || 'dark';
    html.setAttribute('data-theme', theme);
  })();

  function initUI() {
    const html = document.documentElement;
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle?.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('o8_theme', next);
    });

    const hamburger = document.getElementById('hamburger-btn');
    const drawer = document.getElementById('mobile-drawer');
    const overlay = document.getElementById('drawer-overlay');
    hamburger?.addEventListener('click', () => { 
        drawer?.classList.add('open'); 
        overlay?.classList.add('visible'); 
    });
    overlay?.addEventListener('click', () => { 
        drawer?.classList.remove('open'); 
        overlay?.classList.remove('visible'); 
    });
    document.getElementById('drawer-close')?.addEventListener('click', () => {
        drawer?.classList.remove('open'); 
        overlay?.classList.remove('visible'); 
    });
  }

  document.addEventListener('alpine:init', () => {
    Alpine.data('teamApp', () => ({
      lang: localStorage.getItem('o8_locale') || 'en',
      data: null,
      loading: true,

      async init() {
        console.log("TeamApp Init Start");
        setTimeout(() => { if(this.loading) this.loading = false; }, 5000);
        await this.loadLang(this.lang);
        this.loading = false;
        console.log("TeamApp Init Done");
      },

      async loadLang(lang) {
        try {
          const res = await fetch(`data.${lang}.json`);
          if (!res.ok) throw new Error("Fetch failed");
          this.data = await res.json();
          this.lang = lang;
          localStorage.setItem('o8_locale', lang);
        } catch (err) {
          console.error("LoadLang Error:", err);
          if (lang !== 'en') await this.loadLang('en');
        }
      },

      t(path) {
        if (!this.data) return '';
        const parts = path.split('.');
        let current = this.data;
        for (const p of parts) {
          if (!current || current[p] === undefined) return '';
          current = current[p];
        }
        return current;
      }
    }));
  });

  document.addEventListener('DOMContentLoaded', initUI);
</script>
</body>
</html>
