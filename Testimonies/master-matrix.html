        :root {
            --ink: #0F172A;
            --blue: #2563EB;
            --teal: #0D9488;

        }

        .serif {

        }

        /* GLASS MORPHISM */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px -2px rgba(15, 23, 42, 0.05);
        }

        /* TIER CARDS - HIGH LEVEL CERTIFICATION DESIGN */
        .card-platinum {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0%, transparent 40%),
                linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: 0 40px 80px -20px rgba(15, 23, 42, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-platinum::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(255,255,255,0.02) 100px, rgba(255,255,255,0.02) 101px);
            pointer-events: none;
        }

        .card-gold {
            background: linear-gradient(135deg, #B5932F 0%, #E8C158 50%, #B5932F 100%);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255,255,255,0.4) 0%, transparent 60%),
                linear-gradient(45deg, rgba(146, 117, 31, 0.1) 25%, transparent 25%, transparent 50%, rgba(146, 117, 31, 0.1) 50%, rgba(146, 117, 31, 0.1) 75%, transparent 75%, transparent);
            background-size: 100% 100%, 4px 4px;
            border: 2px solid #92751F;
            color: #2D2408;
            box-shadow: 0 40px 80px -20px rgba(181, 147, 47, 0.4);
        }
        .card-gold::after {
            content: '';
            position: absolute;
            inset: 15px;
            border: 1px solid rgba(45, 36, 8, 0.1);
            pointer-events: none;
            border-radius: 40px;
        }

        .card-blue {
            background: #1E40AF;
            background-image: 
                linear-gradient(135deg, #1E3A8A 0%, #2563EB 100%),
                repeating-radial-gradient(circle at 0 0, transparent 0, transparent 40px, rgba(255,255,255,0.05) 40px, rgba(255,255,255,0.05) 80px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 40px 80px -20px rgba(37, 99, 235, 0.4);
        }
        .card-blue::before {
            content: 'CERTIFIED SOVEREIGN';
            position: absolute;
            top: 40px; right: -30px;
            transform: rotate(45deg);
            background: rgba(255,255,255,0.1);
            padding: 5px 40px;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .card-silver {
            background: #F1F5F9;
            background-image: 
                linear-gradient(135deg, #F1F5F9 0%, #94A3B8 100%),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.2) 2px, rgba(255,255,255,0.2) 4px);
            border: 2px solid #CBD5E1;
            color: #0F172A;
            box-shadow: 0 40px 80px -20px rgba(148, 163, 184, 0.3);
        }

        .card-white {
            background: #FFFFFF;
            background-image: 
                linear-gradient(135deg, #FFFFFF 0%, #F8FAFC 100%),
                radial-gradient(circle at 100% 0%, rgba(15,23,42,0.02) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(15,23,42,0.02) 0%, transparent 50%);
            border: 1px solid var(--border);
            color: #334155;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.08);
        }
        .card-white::after {
            content: '';
            position: absolute;
            inset: 20px;
            border: 0.5px solid rgba(15, 23, 42, 0.05);
            border-radius: 36px;
            pointer-events: none;
        }

        /* NAVIGATION */
        .selector-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .selector-btn.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.2);
        }

        /* NODE GRID */
        .node-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background: #F1F5F9;
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid transparent;
        }

        .node-box.active {
            background: var(--teal);
            box-shadow: 0 0 25px rgba(13, 148, 136, 0.4);
            border-color: #5EEAD4;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 56px;
            position: relative;
            transform: scale(0.95);
            transition: 0.4s;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        /* SCROLLBAR */
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeIn 0.8s forwards;
        }
    </style>
</head>

        let activeM = null, activeL = null;

        // STOCHASTIC VISUALIZER (For Demo Purposes)
        function generateDrama(start, months, vol, trend) {
            let data = [start]; let current = start;
            for (let i = 1; i < months; i++) {
                let regime = Math.random();
                let change = (regime > 0.9) ? current * (Math.random() * vol * -1.8) : (regime > 0.75 ? current * 0.001 : current * (Math.random() * vol) * trend);
                current += change; if (current < start * 0.7) current = start * 0.75;
                data.push(Math.round(current));
            }
            return data;
        }

        function init() {
            const nav = document.getElementById('partner-nav');
            nav.innerHTML = Object.keys(MASTER_DATA).map(k => `
                <button onclick="select('${k}', this)" class="selector-btn px-8 py-4 rounded-3xl bg-white text-[10px] font-black uppercase tracking-widest">
                    ${MASTER_DATA[k].identity.name}
                </button>
            `).join('');
            select('thorne', nav.children[0]);
        }

        function select(k, btn) {
            document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const d = MASTER_DATA[k];
            const meta = d.identity;
            const content = d.narrative;
            const tech = d.technical_matrix;
            const perf = d.backtest_performance;

            // UI UPDATES
            document.getElementById('ui-avatar').innerText = meta.avatar;
            document.getElementById('ui-tier').innerText = meta.tier;
            document.getElementById('ui-asset').innerText = meta.asset_collateral;
            document.getElementById('ui-hero').innerText = content.hero;
            document.getElementById('ui-sub').innerText = content.sub;
            document.getElementById('ui-val').innerText = '$' + meta.initial_collateral_value.toLocaleString();
            document.getElementById('ui-reporting').innerHTML = content.reporting.map(p => `<p class="fade-in">"${p}"</p>`).join('');
            document.getElementById('ui-node-status').innerText = `${tech.nodes_active}/11 Nodes Active for ${meta.name}`;
            document.getElementById('ui-confidence').innerText = tech.confidence_gate + ' AI GATE';

            // TIER CARD STYLE MAPPING
            const tierStyles = {
                "Institutional Tier": "platinum",
                "Strategic Partner": "gold",
                "Power House Tier": "blue",
                "Growth Tier": "silver",
                "Seed Tier": "white"
            };
            const styleKey = tierStyles[meta.tier] || "white";

            const card = document.getElementById('tier-card');
            card.className = `p-12 rounded-[56px] relative overflow-hidden transition-all duration-500 card-${styleKey}`;
            document.getElementById('card-status').innerText = meta.status;
            document.getElementById('card-title').innerText = meta.tier;
            document.getElementById('card-desc').innerText = content.sub;
            document.getElementById('card-nodes').innerText = `${tech.nodes_active} Nodes`;
            document.getElementById('card-horizon').innerText = meta.horizon;

            // HARDENING
            document.getElementById('ui-hardening').innerHTML = tech.hardening.map(h => `
                <div class="p-8 bg-white border border-slate-100 rounded-[36px] shadow-sm hover:shadow-xl transition-all">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-[10px] font-bold mb-6 italic">v2</span>
                    <p class="text-[10px] font-black text-blue-600 mb-3 uppercase tracking-widest">${h.t}</p>
                    <p class="text-sm text-slate-500 font-medium leading-relaxed">${h.d}</p>
                </div>
            `).join('');

            // NODES
            const nodeList = ["L2 DEPTH", "ORATS GREEKS", "SENTIMENT", "RL EXEC", "HARD BREAKER", "REGIME DETECT", "VOL BIAS", "FLOW SCAN", "SKEW ADJ", "LIQ NODE", "PIPE CORE"];
            document.getElementById('nodeGrid').innerHTML = nodeList.map((n, i) => `
                <div class="flex flex-col items-center gap-4">
                    <div class="node-box ${i < tech.nodes_active ? 'active' : ''}"></div>
                    <span class="text-[8px] text-slate-400 font-bold text-center uppercase tracking-tighter">${n}</span>
                </div>
            `).join('');

            // MODAL STATIC DATA
            document.getElementById('modal-name').innerText = meta.name;
            document.getElementById('modal-period').innerText = perf.period;
            document.getElementById('modal-disc').innerText = perf.disclaimer;
            document.getElementById('ui-events').innerHTML = (perf.stochastic_logic.drama_events || []).map(e => `
                <div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-blue-50">
                    <span class="text-[10px] font-bold text-blue-600 uppercase">Month ${e.month}</span>
                    <span class="text-xs font-medium text-slate-500">${e.trigger}</span>
                </div>
            `).join('') || '<p class="text-[10px] text-slate-400">No Hardening Events Logged.</p>';

            renderCharts(d);
        }

        function renderCharts(d) {
            const chartData = generateDrama(d.identity.initial_collateral_value, 24, d.backtest_performance.stochastic_logic.volatility_base, d.backtest_performance.stochastic_logic.trend_bias);

            // MINI CHART
            const ctxM = document.getElementById('miniChart').getContext('2d');
            if (activeM) activeM.destroy();
            activeM = new Chart(ctxM, {
                type: 'line',
                data: {
                    labels: chartData.map((_, i) => i),
                    datasets: [{
                        data: chartData,
                        borderColor: '#2563EB',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 100);
                            g.addColorStop(0, 'rgba(37, 99, 235, 0.1)');
                            g.addColorStop(1, 'transparent');
                            return g;
                        },
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } }
            });

            // MAIN CHART (MODAL)
            const ctxL = document.getElementById('mainChart').getContext('2d');
            if (activeL) activeL.destroy();
            activeL = new Chart(ctxL, {
                type: 'line',
                data: {
                    labels: chartData.map((_, i) => `Month ${i+1}`),
                    datasets: [{
                        label: 'Equity Value',
                        data: chartData,
                        borderColor: '#2563EB',
                        borderWidth: 4,
                        pointBackgroundColor: '#FFFFFF',
                        pointBorderColor: '#2563EB',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 400);
                            g.addColorStop(0, 'rgba(37, 99, 235, 0.05)');
                            g.addColorStop(1, 'transparent');
                            return g;
                        },
                        tension: 0.3
                    }]
                },
                options: {
                    plugins: { legend: false },
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        y: { grid: { color: 'rgba(0,0,0,0.03)' }, ticks: { callback: v => '$' + v.toLocaleString() } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

            document.getElementById('scalingModal').classList.toggle('active');
