<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Wilbak | Command Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #f8fafc);
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .industrial-grid {
            background-image:
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
        }

        .modal-blur {
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="industrial-grid min-h-screen p-4 pt-20">
    <div id="auth-gate" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[100] text-center p-10">
        <div class="space-y-6">
            <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto animate-pulse"></div>
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">Initializing<br>Secure Protocol...</h1>
            <p class="text-[10px] mono text-blue-400 uppercase tracking-widest">Validating Crypto-Signatures</p>
        </div>
    </div>

    <!-- Lead Detail Modal -->
    <div id="leadModal"
        class="hidden fixed inset-0 z-[150] modal-blur flex items-end sm:items-center justify-center p-4">
        <div class="bg-slate-950 border border-slate-800 w-full max-w-lg rounded-sm overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div>
                    <div id="modalDate" class="text-[9px] mono text-blue-500 uppercase tracking-widest mb-1">00/00/0000
                    </div>
                    <h3 id="modalTitle" class="text-xl font-black uppercase italic italic tracking-tighter">LEAD NAME
                    </h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="modalContent" class="p-6 space-y-6 max-h-[70vh] overflow-y-auto">
                <!-- Data injected here -->
            </div>
            <div class="p-4 bg-slate-900/50 border-t border-slate-800 flex justify-end">
                <button onclick="closeModal()"
                    class="px-8 py-2 bg-blue-600 text-white font-black uppercase italic text-xs skew-x-[-12deg]">
                    <span class="skew-x-[12deg] inline-block">TERMINATE VIEW</span>
                </button>
            </div>
        </div>
    </div>

    <!-- News Creation Modal -->
    <div id="newsModal" class="hidden fixed inset-0 z-[150] modal-blur flex items-center justify-center p-4">
        <div class="bg-slate-950 border border-slate-800 w-full max-w-lg rounded-sm overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h3 class="text-xl font-black uppercase italic italic tracking-tighter text-sky-400">INJECT INTELLIGENCE
                </h3>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleJsonPaste()"
                        class="text-[9px] mono text-blue-500 hover:text-blue-400 font-bold uppercase tracking-widest border border-blue-500/30 px-2 py-1 rounded">
                        PASTE JSON
                    </button>
                    <button onclick="closeNewsModal()" class="text-slate-500 hover:text-white transition p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="jsonPasteArea" class="hidden p-6 bg-slate-900 border-b border-slate-800">
                <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">RAW JSON
                    INJECTOR</label>
                <textarea id="jsonInput" placeholder='{ "title": "...", "insight": "..." }'
                    class="w-full bg-slate-950 border border-slate-800 p-4 text-[10px] mono text-blue-400 placeholder-slate-700 outline-none focus:border-blue-600 transition h-32 mb-4"></textarea>
                <button onclick="processJsonInjection()"
                    class="w-full py-2 bg-blue-600 text-white font-black uppercase italic text-[10px] skew-x-[-12deg]">
                    <span class="skew-x-[12deg] inline-block">PARSE & POPULATE</span>
                </button>
            </div>
            <form id="newsForm" onsubmit="postManualNews(event)" class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-1">
                        <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">SECTOR</label>
                        <select name="sector" required
                            class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white outline-none focus:border-blue-600 transition">
                            <option value="FINANCE">FINANCE</option>
                            <option value="REAL ESTATE">REAL ESTATE</option>
                            <option value="TRADING">TRADING</option>
                            <option value="POSITIONING">POSITIONING</option>
                            <option value="STRATEGY">STRATEGY</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">HEADLINE</label>
                    <input type="text" name="title" required placeholder="Impactful title..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition">
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">INSIGHT
                        (CRUX)</label>
                    <textarea name="insight" required placeholder="The executive summary..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">MARKET EVENT
                        (SOURCE DATA)</label>
                    <textarea name="marketEvent" placeholder="Raw context or signal details..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">LOGIC ANALYSIS
                        (BREAKDOWN)</label>
                    <textarea name="logicAnalysis" placeholder="What it means for the money..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">THE SOLUTION
                        (CONVERSION)</label>
                    <textarea name="conversionStep" placeholder="The Wilbak fix..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-1">STRATEGIC
                        CONCLUSION</label>
                    <textarea name="strategicConclusion" placeholder="Final impact summary..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-1">LOGIC FRAMEWORK
                        (JSON)</label>
                    <textarea name="logicFramework"
                        placeholder='{ "problemStructure": [...], "transformationModel": [...] }'
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition h-24"></textarea>
                </div>
                <div>
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">SOURCE URL</label>
                    <input type="url" name="sourceUrl" placeholder="https://..."
                        class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase tracking-widest text-white placeholder-slate-500 outline-none focus:border-blue-600 transition">
                </div>
                <div class="pt-4 space-y-4">
                    <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block">IMAGE PAYLOAD (MAX
                        3)</label>
                    <div id="imagePreviewContainer" class="grid grid-cols-3 gap-2"></div>
                    <div class="flex items-center space-x-2">
                        <input type="file" id="imageInput" accept="image/*" class="hidden"
                            onchange="uploadToCloudinary(this)">
                        <button type="button" onclick="document.getElementById('imageInput').click()"
                            class="flex-grow py-3 border border-dashed border-slate-700 text-[10px] mono text-slate-500 uppercase hover:border-blue-500 hover:text-blue-500 transition">
                            + ADD VISUAL INTEL
                        </button>
                    </div>
                </div>
                <div id="advancedFields" class="hidden pt-6 border-t border-slate-800 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">DATE
                                OVERRIDE</label>
                            <input type="datetime-local" name="createdAt"
                                class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono text-white outline-none focus:border-blue-600 transition">
                        </div>
                        <div>
                            <label class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-2">NODE
                                STATUS</label>
                            <select name="status"
                                class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono uppercase text-white outline-none focus:border-blue-600 transition">
                                <option value="ACTIVE">ACTIVE</option>
                                <option value="ARCHIVED">ARCHIVED</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label
                                class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-1">LIKES</label>
                            <input type="number" name="likes" value="0"
                                class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono text-white outline-none focus:border-blue-600 transition">
                        </div>
                        <div>
                            <label
                                class="text-[8px] mono text-blue-500 uppercase tracking-widest block mb-1">DISLIKES</label>
                            <input type="number" name="dislikes" value="0"
                                class="w-full bg-slate-900 border border-slate-800 p-3 text-xs mono text-white outline-none focus:border-blue-600 transition">
                        </div>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="button" onclick="document.getElementById('advancedFields').classList.toggle('hidden')"
                        class="text-[8px] mono text-slate-500 uppercase mb-4 block hover:text-blue-400">Toggle Advanced
                        Override</button>
                    <button type="submit" id="postNewsBtn"
                        class="w-full py-4 bg-green-600 text-white font-black uppercase italic text-xs skew-x-[-12deg] hover:bg-green-500 transition-all">
                        <span id="submitBtnText" class="skew-x-[12deg] inline-block">DEPLOY INTELLIGENCE</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header class="mb-12 mt-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <div class="text-[10px] mono text-blue-500 uppercase tracking-widest mb-1">[ STATUS: ADMIN ]</div>
                    <h2 class="text-3xl font-black uppercase italic italic tracking-tighter">Command Center</h2>
                </div>

                <div class="w-full md:w-auto grid grid-cols-2 md:flex md:items-center gap-3">
                    <button onclick="openTopicModal()" id="syncBtn"
                        class="flex items-center justify-center space-x-2 px-3 py-3 border border-blue-600 bg-blue-600/10 text-blue-400 hover:bg-blue-600 hover:text-white transition rounded-sm font-black text-[9px] uppercase italic tracking-widest">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <span>Sensory Scan</span>
                    </button>

                    <button onclick="openNewsModal()"
                        class="flex items-center justify-center space-x-2 px-3 py-3 border border-green-600 bg-green-600/10 text-green-400 hover:bg-green-600 hover:text-white transition rounded-sm font-black text-[9px] uppercase italic tracking-widest">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        <span>Inject News</span>
                    </button>

                    <div class="col-span-2 md:col-span-1 flex items-center space-x-2">
                        <input type="text" id="intelQuery" placeholder="TARGET SECTOR..."
                            class="flex-grow bg-slate-900 border border-slate-800 px-3 py-3 rounded-sm text-[9px] mono text-blue-400 focus:border-blue-500 outline-none uppercase">

                        <div class="flex space-x-1">
                            <!-- CSV Export (Bot) -->
                            <button onclick="exportLeadsCSV()" title="Export Leads to Telegram (CSV)"
                                class="p-3 border border-blue-600/50 hover:bg-blue-600 text-blue-500 hover:text-white transition rounded-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                            </button>
                            
                            <!-- JSON Export -->
                            <button onclick="exportDataJSON()" title="Export All Data (JSON)"
                                class="p-3 border border-purple-600/50 hover:bg-purple-600 text-purple-500 hover:text-white transition rounded-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </button>

                            <!-- JSON Import -->
                            <label title="Import Data (JSON)"
                                class="p-3 border border-orange-600/50 hover:bg-orange-600 text-orange-500 hover:text-white transition cursor-pointer rounded-sm">
                                <input type="file" id="jsonImport" class="hidden" accept=".json" onchange="importDataJSON(this)">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                </svg>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="SEARCH OPERATIVES..."
                    class="w-full bg-slate-900 border border-slate-800 p-4 text-xs mono uppercase tracking-widest outline-none focus:border-blue-600 transition">
            </div>
            <div class="flex space-x-2">
                <input type="date" id="dateFilter"
                    class="flex-1 bg-slate-900 border border-slate-800 p-4 text-xs mono uppercase tracking-widest outline-none focus:border-blue-600 transition">
                <button onclick="resetFilters()"
                    class="px-4 bg-slate-800 text-[10px] font-black uppercase tracking-widest">Reset</button>
            </div>
        </div>

        <div class="mb-12">
            <div class="flex border-b border-slate-800 mb-8">
                <button onclick="switchTab('leads')" id="tab-leads"
                    class="px-8 py-4 text-[10px] mono border-b-2 border-blue-600 text-blue-500 font-bold uppercase tracking-widest">Leads
                    Hub</button>
                <button onclick="switchTab('intelligence')" id="tab-intelligence"
                    class="px-8 py-4 text-[10px] mono border-b-2 border-transparent text-slate-500 font-bold uppercase tracking-widest hover:text-white transition">Intelligence
                    Hub</button>
            </div>

            <div id="leads-view" class="space-y-4">
                <div id="leadsContainer" class="space-y-4 pb-20">
                    <div class="text-center py-20 opacity-20 mono text-[10px] uppercase tracking-[0.5em]">No Data Cached
                    </div>
                </div>
            </div>

            <div id="intelligence-view" class="hidden space-y-4">
                <div id="nodesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-20">
                    <div class="col-span-full text-center py-20 opacity-20 mono text-[10px] uppercase tracking-[0.5em]">
                        No Intelligence Logged</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.expand();
        WebApp.enableClosingConfirmation();

        let leads = [];
        let nodes = [];
        let uploadedImages = [];
        let editingNodeId = null;

        async function init() {
            const initData = WebApp.initData;
            const userId = String(WebApp.initDataUnsafe?.user?.id || '');

            try {
                // Fetch Admin Config - Server-side verification happens here via middleware
                const configRes = await fetch('/api/admin/config', {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                
                if (!configRes.ok) {
                    const err = await configRes.json().catch(() => ({ error: 'Unauthorized operative' }));
                    document.getElementById('auth-gate').innerHTML = `
                        <div class="text-red-500 font-black italic">ACCESS DENIED.<br>${err.error.toUpperCase()}</div>
                    `;
                    return;
                }
                
                const config = await configRes.json();
                
                // Final safety cross-check: Ensure the logged-in user matches the server-side restricted ID
                const expectedId = String(config.telegramUserId || '').trim();
                if (userId !== expectedId) {
                    console.error('[AUTH] Identity Mismatch:', userId, 'expected', expectedId);
                    document.getElementById('auth-gate').innerHTML = `
                        <div class="text-red-500 font-black italic">ACCESS DENIED.<br>UNAUTHORIZED IDENTITY DETECTED.</div>
                    `;
                    return;
                }

                // Fetch Leads
                const leadsRes = await fetch('/api/admin/leads', {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                if (leadsRes.ok) leads = await leadsRes.json();

                // Fetch Intelligence
                const nodesRes = await fetch('/api/admin/intelligence/list', {
                    headers: { 'X-Telegram-Init-Data': initData }
                });
                if (nodesRes.ok) nodes = await nodesRes.json();

                renderLeads(leads);
                renderNodes(nodes);

                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } catch (e) {
                console.error('[INIT_FAILED]', e);
                document.getElementById('auth-gate').innerHTML = `<div class="text-red-500 font-black italic">PROTOCOL ERROR. ${e.message.toUpperCase()}</div>`;
            }
        }

        function createDataRow(label, value) {
            if (!value) value = 'N/A';
            return `
                <div class="group relative bg-slate-900/80 border border-slate-800 p-4 hover:border-blue-600/50 transition-all cursor-pointer" onclick="copyToClipboard('${value}', this)">
                    <div class="text-[8px] mono text-blue-500 uppercase tracking-[0.2em] mb-1">${label}</div>
                    <div class="text-sm font-bold text-slate-100 break-words">${value}</div>
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path>
                        </svg>
                    </div>
                </div>
            `;
        }

        function openModal(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;

            WebApp.HapticFeedback.impactOccurred('medium');
            document.getElementById('modalDate').innerText = new Date(lead.createdAt).toLocaleDateString();
            document.getElementById('modalTitle').innerText = lead.auditName || 'UNKNOWN OPERATIVE';

            const fields = [
                { label: 'OP NAME', value: lead.auditName },
                { label: 'EMAIL PROTOCOL', value: lead.auditEmail },
                { label: 'MOBILE FREQUENCY', value: lead.auditPhone },
                { label: 'OPERATIONAL SECTOR', value: lead.industry },
                { label: 'MANUAL WASTE (HRS/WK)', value: lead.hours },
                { label: 'BUSINESS DNA', value: lead.businessDetail },
                { label: 'WORKFLOW DESCRIPTION', value: lead.workflow },
                { label: 'CURRENT STATUS', value: lead.status }
            ];

            document.getElementById('modalContent').innerHTML = fields.map(f => createDataRow(f.label, f.value)).join('');
            document.getElementById('leadModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('leadModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function openNewsModal(nodeId = null) {
            WebApp.HapticFeedback.impactOccurred('medium');
            const form = document.getElementById('newsForm');
            form.reset();
            uploadedImages = [];
            window.lastInjectedData = null; // Clear any previous JSON injection data
            renderImagePreviews();
            editingNodeId = nodeId;
            document.getElementById('advancedFields').classList.add('hidden');

            if (nodeId) {
                const node = nodes.find(n => n.id === nodeId);
                if (node) {
                    form.querySelector('[name="sector"]').value = node.sector.toUpperCase();
                    form.querySelector('[name="title"]').value = node.title;
                    form.querySelector('[name="insight"]').value = node.insight;
                    form.querySelector('[name="marketEvent"]').value = formatValue(node.marketEvent);
                    form.querySelector('[name="logicAnalysis"]').value = formatValue(node.logicAnalysis);
                    form.querySelector('[name="conversionStep"]').value = formatValue(node.conversionStep);
                    form.querySelector('[name="strategicConclusion"]').value = formatValue(node.strategicConclusion);
                    form.querySelector('[name="logicFramework"]').value = formatValue(node.logicFramework);
                    form.querySelector('[name="sourceUrl"]').value = node.sourceUrl || '';
                    form.querySelector('[name="status"]').value = node.status;

        function processJsonInjection() {
            const jsonText = document.getElementById('jsonInput').value.trim();
            if (!jsonText) return;

            try {
                // Robust Cleaning for High-End Copy-Paste Errors
                let cleaned = jsonText
                    // 1. Standardize all variants of smart quotes to double quotes for keys/values
                    .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"')
                    // 2. Standardize smart single quotes/apostrophes
                    .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'")
                    // 3. Strip trailing commas before closing braces/brackets (invalid JSON)
                    .replace(/,\s*([}\]])/g, '$1')
                    // 4. Handle escaped quotes that might be double-escaped or malformed
                    .replace(/\\"/g, '"');

                // Final Pass: Ensure keys are properly quoted if they came in loose (common in manual scripts)
                // This is a basic attempt to fix unquoted keys produced by some AI models
                cleaned = cleaned.replace(/([{,]\s*)(\w+)(\s*:)/g, '$1"$2"$3');

                const data = JSON.parse(cleaned);
                const form = document.getElementById('newsForm');

                // Helper to format values for textareas
                const formatValue = (val) => {
                    if (typeof val === 'object' && val !== null) {
                        return JSON.stringify(val, null, 2);
                    }
                    return val || '';
                };

                // Mapping JSON keys to form inputs
                if (data.sector) form.querySelector('[name="sector"]').value = data.sector.toUpperCase();
                if (data.title || data.headline) form.querySelector('[name="title"]').value = data.title || data.headline;
                if (data.insight) form.querySelector('[name="insight"]').value = data.insight;

                // Handle market event mapping
                const mEvent = data.market_event || data.marketEvent;
                if (mEvent) form.querySelector('[name="marketEvent"]').value = formatValue(mEvent);

                // Handle logic analysis mapping
                const lAnalysis = data.logic_analysis || data.logicAnalysis;
                if (lAnalysis) form.querySelector('[name="logicAnalysis"]').value = formatValue(lAnalysis);

                // Handle conversion step mapping
                const cStep = data.solution || data.conversionStep || data.conversion_step;
                if (cStep) form.querySelector('[name="conversionStep"]').value = formatValue(cStep);

                // Handle strategic conclusion mapping
                const sConclusion = data.strategic_conclusion || data.strategicConclusion;
                if (sConclusion) form.querySelector('[name="strategicConclusion"]').value = formatValue(sConclusion);

                // Handle nested JSON fields
                if (data.logic_framework || data.logicFramework) {
                    const lf = data.logic_framework || data.logicFramework;
                    form.querySelector('[name="logicFramework"]').value = formatValue(lf);
                    data.logicFramework = lf;
                }

                if (data.source_url || data.sourceUrl) form.querySelector('[name="sourceUrl"]').value = data.source_url || data.sourceUrl;

                window.lastInjectedData = data; // Cache for submission

                WebApp.HapticFeedback.notificationOccurred('success');
                document.getElementById('jsonPasteArea').classList.add('hidden');
                document.getElementById('jsonInput').value = '';

            } catch (e) {
                console.error('[JSON_INJECT_FAILURE]', e);
                WebApp.showAlert('DIAGNOSTIC FAILURE: JSON syntax is invalid. Check for unclosed quotes or unescaped characters. Error: ' + e.message.slice(0, 50));
                WebApp.HapticFeedback.notificationOccurred('error');
            }
        }

        function formatValue(val) {
            if (typeof val === 'object' && val !== null) {
                return JSON.stringify(val, null, 2);
            }
            return val || '';
        }

        async function postManualNews(e) {
            e.preventDefault();

            const formData = new FormData(form);
            let data = Object.fromEntries(formData.entries());

            // Merge with complex data if available from JSON injection
            if (window.lastInjectedData) {
                data = { ...window.lastInjectedData, ...data };
            }

            // Ensure JSON fields are handled correctly from textareas (which might have been edited)
            const jsonFields = ['conversionStep', 'logicFramework'];
            jsonFields.forEach(field => {
                const element = form.querySelector(`[name="${field}"]`);
                if (element && element.value.trim()) {
                    try {
                        const val = element.value.trim();
                        if (val.startsWith('{') || val.startsWith('[')) {
                            data[field] = JSON.parse(val);
                        }
                    } catch (e) {
                        console.warn('JSON Parse Error for field:', field, e);
                    }
                }

            btn.classList.add('opacity-50', 'animate-pulse');

                const response = await fetch(url, {

                        'X-Telegram-Init-Data': WebApp.initData,
